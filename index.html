<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kira's Park</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block;
    }

    /* ── HUD ───────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #hp-container {
      position: absolute;
      top: 14px; left: 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 6px 10px;
    }

    #hp-label {
      color: #eee;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    #hp-bar-outer {
      width: 200px;
      height: 14px;
      background: #1a1a1a;
      border-radius: 7px;
      overflow: hidden;
    }

    #hp-bar-inner {
      height: 100%;
      width: 100%;
      background: #2ecc40;
      border-radius: 7px;
      transition: width 0.25s ease, background 0.4s ease;
    }

    #hp-text {
      color: #ccc;
      font-size: 10px;
      text-align: right;
      margin-top: 2px;
    }

    #score-display {
      position: absolute;
      top: 14px; right: 14px;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 6px 14px;
      letter-spacing: 1px;
    }

    #status-msg {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffe;
      font-size: 16px;
      font-weight: bold;
      background: rgba(0,0,0,0.65);
      border-radius: 6px;
      padding: 6px 18px;
      pointer-events: none;
      transition: opacity 0.4s ease;
      white-space: nowrap;
    }

    /* ── Inventory Panel ────────────────────────────────── */
    #inventory-panel {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 10, 0.9);
      color: #f0f0f0;
      padding: 22px 30px;
      min-width: 220px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      z-index: 100;
      pointer-events: auto;
    }

    #inventory-panel h3 {
      font-size: 16px;
      letter-spacing: 3px;
      margin-bottom: 12px;
      color: #ffdc00;
      text-transform: uppercase;
    }

    #inventory-list {
      list-style: none;
      line-height: 2;
      font-size: 14px;
    }

    #inventory-hint {
      margin-top: 14px;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #333;
      padding-top: 8px;
    }

    .hidden { display: none !important; }

    /* ── Controls Legend ────────────────────────────────── */
    #controls-legend {
      position: absolute;
      bottom: 12px; left: 14px;
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      background: rgba(0,0,0,0.4);
      padding: 5px 10px;
      border-radius: 5px;
      pointer-events: none;
      line-height: 1.6;
    }

    /* ── Loading Screen ─────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a1a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      color: #fff;
      font-family: monospace;
    }

    #loading-title {
      font-size: 36px;
      font-weight: bold;
      color: #2ecc40;
      margin-bottom: 8px;
    }

    #loading-sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }

    #loading-bar-outer {
      width: 240px;
      height: 8px;
      background: #222;
      border-radius: 4px;
      overflow: hidden;
    }

    #loading-bar-inner {
      height: 100%;
      background: #2ecc40;
      width: 0%;
      animation: loadprogress 1.2s ease forwards;
    }

    @keyframes loadprogress {
      0%   { width: 0%; }
      60%  { width: 70%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Loading screen (removed once game starts) -->
  <div id="loading">
    <div id="loading-title">🐱 Kira's Park</div>
    <div id="loading-sub">A fuzzy cat adventure</div>
    <div id="loading-bar-outer"><div id="loading-bar-inner"></div></div>
  </div>

  <!-- Three.js canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="hp-container">
      <div id="hp-label">HP</div>
      <div id="hp-bar-outer">
        <div id="hp-bar-inner"></div>
      </div>
      <div id="hp-text">30 / 30</div>
    </div>
    <div id="score-display">Score: 0</div>
    <div id="status-msg" style="opacity:0"></div>
  </div>

  <!-- Inventory panel -->
  <div id="inventory-panel" class="hidden">
    <h3>&#x1F4BC; Inventory</h3>
    <ul id="inventory-list"></ul>
    <div id="inventory-hint">Press I or Escape to close</div>
  </div>

  <!-- Controls legend -->
  <div id="controls-legend">
    WASD &mdash; Move &nbsp;|&nbsp; Space &mdash; Jump &nbsp;|&nbsp;
    Enter &mdash; Interact / Pick Up / Attack &nbsp;|&nbsp;
    B &mdash; Drop cheese as bait &nbsp;|&nbsp;
    I &mdash; Inventory &nbsp;|&nbsp; Right-drag &mdash; Orbit camera
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    // Remove loading screen once game module initialises
    import('./js/game.js').then(() => {
      setTimeout(() => {
        const el = document.getElementById('loading');
        if (el) el.remove();
      }, 1300);
    }).catch(err => {
      document.getElementById('loading').innerHTML =
        '<div style="color:#ff4136;font-size:18px;padding:20px">Failed to load game.<br>' +
        err.message + '</div>';
    });
  </script>
</body>
</html>
