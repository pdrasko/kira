<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Piano Study Guide</title>
<link rel="stylesheet" href="css/styles.css?v=5">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B9%3C/text%3E%3C/svg%3E">
<script src="vendor/opensheetmusicdisplay.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>🎹 Piano Study Guide</h1>
      <nav class="app-nav">
        <button data-route="/home" type="button">Home</button>
        <button data-route="/path" type="button">Path</button>
        <button data-route="/repertoire" type="button">Repertoire</button>
        <button data-route="/record" type="button">Record</button>
        <button data-route="/stats" type="button">Stats</button>
        <button data-route="/profile" type="button">Profile</button>
      </nav>
      <div class="header-spacer"></div>
      <button class="midi-dot" id="header-midi-chip" type="button" title="MIDI: checking…">🎹</button>
      <div class="streak-chip" id="header-streak"></div>
      <div class="goal-ring" id="header-goal-ring" title="Today's practice goal"></div>
    </header>
    <main id="screen-root"></main>
    <footer class="app-footer">
      Sheet music rendered with <a href="https://opensheetmusicdisplay.org/" target="_blank" rel="noopener">OpenSheetMusicDisplay</a> (BSD-3).
      Everything is stored locally in this browser — see <a href="README.md">README</a> for the data model and cloud-migration plan.
    </footer>
  </div>

  <!--
    Cache-busting: every ./js/*.js specifier is remapped here to a
    versioned URL, same technique as the root app's index.html. Without
    this, a browser (or GitHub Pages' CDN) can keep serving a stale copy
    of one of these ~28 ES modules after a deploy since none of them are
    referenced with a version query string in the import statements that
    load them. Bump every "?v=N" below (a single find-and-replace) whenever
    shipping a change to any file under js/ so this stops mattering.
  -->
  <script type="importmap">
    { "imports": {
        "./js/app-state.js": "./js/app-state.js?v=5",
        "./js/app.js": "./js/app.js?v=5",
        "./js/catalog.js": "./js/catalog.js?v=5",
        "./js/db.js": "./js/db.js?v=5",
        "./js/events.js": "./js/events.js?v=5",
        "./js/keyboard.js": "./js/keyboard.js?v=5",
        "./js/loop-selection.js": "./js/loop-selection.js?v=5",
        "./js/metronome.js": "./js/metronome.js?v=5",
        "./js/midi.js": "./js/midi.js?v=5",
        "./js/mistakes.js": "./js/mistakes.js?v=5",
        "./js/models.js": "./js/models.js?v=5",
        "./js/musicxml-builder.js": "./js/musicxml-builder.js?v=5",
        "./js/note-bus.js": "./js/note-bus.js?v=5",
        "./js/piano-roll.js": "./js/piano-roll.js?v=5",
        "./js/practice-engine.js": "./js/practice-engine.js?v=5",
        "./js/recorder.js": "./js/recorder.js?v=5",
        "./js/router.js": "./js/router.js?v=5",
        "./js/screens/home.js": "./js/screens/home.js?v=5",
        "./js/screens/path.js": "./js/screens/path.js?v=5",
        "./js/screens/player.js": "./js/screens/player.js?v=5",
        "./js/screens/profile.js": "./js/screens/profile.js?v=5",
        "./js/screens/record.js": "./js/screens/record.js?v=5",
        "./js/screens/repertoire.js": "./js/screens/repertoire.js?v=5",
        "./js/screens/stats.js": "./js/screens/stats.js?v=5",
        "./js/seed-catalog.js": "./js/seed-catalog.js?v=5",
        "./js/sheetmusic.js": "./js/sheetmusic.js?v=5",
        "./js/stats.js": "./js/stats.js?v=5",
        "./js/synth.js": "./js/synth.js?v=5",
        "./js/util.js": "./js/util.js?v=5"
    } }
  </script>
  <script type="module">
    import './js/app.js';
  </script>
</body>
</html>
